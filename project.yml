name: BibleCopilot
options:
  bundleIdPrefix: com.scripturecopilot
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15"

targets:
  BibleCopilot:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: BibleCopilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scripturecopilot.app
        PRODUCT_NAME: Bible Copilot
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "2.4.0"
        CURRENT_PROJECT_VERSION: "125"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "846N5D6TMK"
        ENABLE_BITCODE: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    info:
      path: BibleCopilot/Resources/Info.plist
      properties:
        CFBundleDisplayName: Bible Copilot
        CFBundleName: BibleCopilot
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleIdentifier: com.scripturecopilot.app
        UILaunchScreen:
          UIColorName: systemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
