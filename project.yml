name: BibleCopilot
options:
  bundleIdPrefix: com.scripturecopilot
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

targets:
  BibleCopilot:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: BibleCopilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.scripturecopilot.app
        PRODUCT_NAME: Bible Copilot
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.5.1"
        CURRENT_PROJECT_VERSION: "88"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_BITCODE: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    info:
      path: BibleCopilot/Resources/Info.plist
      properties:
        CFBundleDisplayName: Bible Copilot
        CFBundleName: BibleCopilot
        CFBundleVersion: "88"
        CFBundleShortVersionString: "1.5.1"
        CFBundleIdentifier: com.scripturecopilot.app
        UILaunchScreen:
          UIColorName: systemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: Used for voice input to ask Bible questions
